<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lala — Search Stays</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <link rel="icon" type="image/png" href="logo-removebg-preview.png">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, system-ui, 'Helvetica Neue', sans-serif;
      background: var(--canvas);
      color: var(--ink);
      line-height: 1.5;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 { font-family: 'Inter', sans-serif; letter-spacing: -0.02em; }

    /* ---- NAV ---- */
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 40px; height: 72px;
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--canvas);
      border-bottom: 1px solid var(--hairline);
      transition: transform 0.3s ease;
    }
    nav.hidden {
      transform: translateY(-100%);
    }
    .logo-img { height: 32px; display: block; }
    .nav-links { display: flex; gap: 8px; align-items: center; }
    .nav-links a {
      font-family: 'Inter', sans-serif; font-weight: 500; font-size: 14px;
      color: var(--ink); text-decoration: none; padding: 8px 14px;
      border-radius: 9999px; transition: all 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { background: var(--surface-strong); }
    .nav-cta {
      background: var(--accent) !important;
      color: #fff !important;
      font-weight: 600 !important;
    }
    .nav-cta:hover { background: var(--accent-hover) !important; }

    @media (max-width: 768px) {
      nav { padding: 0 16px; }
      .nav-links a:not(.nav-cta):not([href="index.html"]) { display: none; }
    }

    /* ---- SEARCH HEADER ---- */
    .search-header {
      margin-top: 72px; padding: 24px 24px 16px;
      background: var(--canvas);
      position: sticky; top: 72px; z-index: 50;
      border-bottom: 1px solid var(--hairline-soft);
      transition: transform 0.3s ease;
    }
    .search-header.hidden {
      transform: translateY(-100%);
    }
    .search-header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; gap: 12px;
    }
    .search-input-wrap {
      flex: 1; display: flex; align-items: center;
      background: var(--surface-soft); border-radius: 9999px;
      padding: 0 16px; height: 48px;
      border: 1.5px solid transparent;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-input-wrap:focus-within {
      border-color: var(--accent);
      background: var(--canvas);
    }
    .search-input-wrap i { color: var(--muted); font-size: 18px; margin-right: 10px; }
    .search-input-wrap input {
      flex: 1; border: none; background: transparent; font-size: 15px;
      color: var(--ink); outline: none; font-family: 'Inter', sans-serif;
    }
    .search-input-wrap input::placeholder { color: var(--muted-soft); }

    /* ---- FILTER ROW ---- */
    .filter-bar {
      max-width: 1200px; margin: 12px auto 0;
      padding: 0 24px;
      display: flex; gap: 8px; overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .fchip {
      padding: 8px 16px; border-radius: 9999px;
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500;
      border: 1px solid var(--hairline);
      background: var(--canvas);
      color: var(--ink);
      white-space: nowrap; cursor: pointer;
      transition: all 0.2s; flex-shrink: 0;
    }
    .fchip:hover { border-color: var(--ink); }
    .fchip.on {
      background: var(--ink); color: #fff; border-color: var(--ink);
    }

    .filter-actions {
      display: flex; align-items: center; gap: 12px;
      margin-left: auto; flex-shrink: 0;
    }
    .price-toggle {
      font-size: 13px; color: var(--muted); cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      font-family: 'Inter', sans-serif; font-weight: 500;
      padding: 8px 14px; border-radius: 9999px;
      border: 1px solid var(--hairline);
      transition: all 0.2s;
    }
    .price-toggle:hover { border-color: var(--ink); }

    .sort-select {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: 9999px;
      padding: 8px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500;
      color: var(--ink);
      outline: none;
      cursor: pointer;
    }

    /* ---- PRICE FILTER PANEL ---- */
    .price-panel {
      max-width: 1200px; margin: 0 auto;
      padding: 0 24px;
      display: none;
    }
    .price-panel.open { display: block; }
    .price-panel-inner {
      display: flex; gap: 12px; align-items: center;
      padding: 12px 16px; background: var(--surface-soft);
      border-radius: 14px; margin-top: 8px;
    }
    .price-group { display: flex; align-items: center; gap: 6px; }
    .price-group label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .price-group input {
      width: 90px; background: var(--canvas); border: 1px solid var(--hairline);
      border-radius: 8px; padding: 8px 10px; font-size: 13px;
      color: var(--ink); outline: none; font-family: 'Inter', sans-serif;
    }
    .price-group input:focus { border-color: var(--accent); }
    .price-apply {
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 8px 18px;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; margin-left: auto;
    }
    .price-apply:hover { background: var(--accent-hover); }

    /* ---- RESULTS ---- */
    .results-area {
      max-width: 1200px; margin: 0 auto;
      padding: 24px;
    }
    .results-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .results-count {
      font-family: 'Inter', sans-serif;
      font-size: 15px; font-weight: 600; color: var(--ink);
    }

    .listings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .lcard {
      background: var(--canvas); border-radius: 14px;
      border: 1px solid var(--hairline);
      overflow: hidden; display: block; text-decoration: none; color: inherit;
      transition: all 0.25s;
      box-shadow: var(--shadow-card);
    }
    .lcard:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.02), 0 6px 16px rgba(0,0,0,0.08);
    }

    .limg {
      height: 180px; display: flex; align-items: center; justify-content: center;
      font-size: 40px; position: relative; overflow: hidden;
    }
    .limg img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .limg.green { background: linear-gradient(135deg, #A5D6A7, #66BB6A); }

    .save-btn {
      position: absolute; top: 10px; right: 10px; width: 36px; height: 36px;
      border-radius: 50%; background: rgba(255,255,255,0.9);
      border: none; color: var(--ink); font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 2; transition: all 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .save-btn:hover { transform: scale(1.1); }
    .save-btn.saved { color: var(--red); }

    .pbadge {
      position: absolute; bottom: 10px; left: 10px;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      color: #fff; font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 9999px;
      font-family: 'Inter', sans-serif;
    }

    .lbody { padding: 16px; }
    .lname { font-weight: 600; font-size: 16px; color: var(--ink); }
    .lloc { font-size: 13px; color: var(--muted); margin-top: 3px; display: flex; align-items: center; gap: 4px; }
    .lmid { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .review-label { font-size: 12px; color: var(--muted-soft); }
    .amenities { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
    .apill-card {
      background: var(--accent-light); color: var(--accent-hover); font-size: 10px;
      font-weight: 500; padding: 2px 8px; border-radius: 9999px;
    }
    .lrow { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .lprice { font-weight: 700; font-size: 18px; color: var(--accent-hover); }
    .lprice sub { font-size: 12px; color: var(--muted); font-weight: 400; }

    /* ---- LOAD MORE ---- */
    .load-more-wrap { text-align: center; margin-top: 28px; }
    .load-more-btn {
      background: var(--canvas); color: var(--ink);
      border: 1.5px solid var(--hairline); border-radius: 9999px;
      padding: 12px 32px; font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: all 0.2s;
    }
    .load-more-btn:hover { border-color: var(--ink); }

    /* ---- FADE UP ---- */
    .fade-up { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
    .fade-up-d1 { transition-delay: 0.1s; }
    .fade-up-d2 { transition-delay: 0.2s; }

    @media (max-width: 768px) {
      .search-header { padding: 16px; }
      .filter-bar { padding: 0 16px; }
      .results-area { padding: 16px; }
      .listings-grid { grid-template-columns: 1fr; }
      .search-header-inner { flex-direction: column; align-items: stretch; }
      .sort-select { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- NAV -->
  <nav>
    <a href="index.html" class="logo">
      <img src="logo-removebg-preview.png" alt="Lala Logo" class="logo-img">
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="search.html" class="active">Stays</a>
      <a href="transfers.html">Transfers</a>
      <a href="my-bookings.html">My Trips</a>
      <a href="host-signup.html" class="nav-cta">List Stays</a>
      <a href="guest-login.html">Sign In</a>
    </div>
  </nav>

  <!-- STICKY SEARCH HEADER -->
  <div class="search-header">
    <div class="search-header-inner">
      <div class="search-input-wrap">
        <i class="ti ti-search"></i>
        <input type="text" id="citySearch" placeholder="Search by city (e.g. Lusaka)" onkeydown="if(event.key==='Enter') applyFilters()">
      </div>
      <button onclick="applyFilters()" style="background:var(--accent);color:#fff;border:none;border-radius:9999px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">
        <i class="ti ti-search" style="font-size:20px;"></i>
      </button>
    </div>
    <div class="filter-bar" id="typeFilters">
      <div class="fchip on" data-type="">All Stays</div>
      <div class="fchip" data-type="Guesthouse">Guesthouse</div>
      <div class="fchip" data-type="Lodge">Lodge</div>
      <div class="fchip" data-type="Hostel">Hostel</div>
      <div class="fchip" data-type="Rest House">Rest House</div>
      <div class="filter-actions">
        <div class="price-toggle" onclick="togglePriceFilter()">
          <i class="ti ti-filter"></i> Price
          <i class="ti ti-chevron-down" id="priceChevron"></i>
        </div>
        <select class="sort-select" id="sortSelect" onchange="applySort()">
          <option value="newest">Newest</option>
          <option value="price_asc">Price: Low</option>
          <option value="price_desc">Price: High</option>
          <option value="rating">Best Rated</option>
        </select>
      </div>
    </div>
  </div>

  <!-- PRICE PANEL -->
  <div class="price-panel" id="pricePanel">
    <div class="price-panel-inner">
      <div class="price-group">
        <label>Min</label>
        <input type="number" id="minPrice" placeholder="K0" min="0">
      </div>
      <div class="price-group">
        <label>Max</label>
        <input type="number" id="maxPrice" placeholder="K5000" min="0">
      </div>
      <button class="price-apply" onclick="applyPriceFilter()">Apply</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results-area" id="listingsContainer">
    <div class="results-header fade-up visible">
      <div class="results-count" id="resultsCount">Loading stays...</div>
    </div>
    <div class="listings-grid" id="listingsGrid">
      <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted-soft);font-size:14px;">
        <i class="ti ti-loader" style="font-size:32px;display:block;margin-bottom:12px;"></i>
        Loading...
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    let currentFilters = { city: '', type: '', sort: 'newest', minPrice: '', maxPrice: '' };
    let savedIds = new Set(JSON.parse(localStorage.getItem('lala_saved') || '[]'));
    let allListings = [];
    let isLoadingMore = false;

    function togglePriceFilter() {
      const panel = document.getElementById('pricePanel');
      const chevron = document.getElementById('priceChevron');
      panel.classList.toggle('open');
      chevron.classList.toggle('ti-chevron-down');
      chevron.classList.toggle('ti-chevron-up');
    }

    function applyPriceFilter() {
      currentFilters.minPrice = document.getElementById('minPrice').value;
      currentFilters.maxPrice = document.getElementById('maxPrice').value;
      loadListings();
    }

    function getScoreBadge(rating) {
      if (!rating || rating === 0) return '<span class="score-badge score-new"><i class="ti ti-star"></i> New</span>';
      if (rating >= 4.5) return `<span class="score-badge score-excellent"><i class="ti ti-star-filled"></i> ${rating.toFixed(1)}</span>`;
      if (rating >= 4.0) return `<span class="score-badge score-very-good"><i class="ti ti-star-filled"></i> ${rating.toFixed(1)}</span>`;
      if (rating >= 3.0) return `<span class="score-badge score-good"><i class="ti ti-star-filled"></i> ${rating.toFixed(1)}</span>`;
      return `<span class="score-badge score-fair"><i class="ti ti-star-filled"></i> ${rating.toFixed(1)}</span>`;
    }

    function toggleSaveCard(e, listingId) {
      e.preventDefault();
      e.stopPropagation();
      if (savedIds.has(listingId)) savedIds.delete(listingId);
      else savedIds.add(listingId);
      localStorage.setItem('lala_saved', JSON.stringify([...savedIds]));
      const btn = e.currentTarget;
      btn.classList.toggle('saved', savedIds.has(listingId));
      btn.innerHTML = savedIds.has(listingId) ? '<i class="ti ti-heart-filled"></i>' : '<i class="ti ti-heart"></i>';
    }

    function renderListingCard(listing) {
      const isSaved = savedIds.has(listing.id);
      const photoUrl = (listing.photos && listing.photos[0]) || '';
      return `
        <a href="listing-detail.html?id=${listing.id}" class="lcard fade-up visible">
          <div class="limg ${photoUrl ? '' : 'green'}">
            ${photoUrl ? `<img src="${photoUrl}" loading="lazy" alt="${listing.name}">` : '<i class="ti ti-home"></i>'}
            <button class="save-btn ${isSaved ? 'saved' : ''}" onclick="toggleSaveCard(event, '${listing.id}')">
              <i class="ti ${isSaved ? 'ti-heart-filled' : 'ti-heart'}"></i>
            </button>
            <span class="pbadge">${listing.type}</span>
          </div>
          <div class="lbody">
            <div class="lname">${listing.name}</div>
            <div class="lloc"><i class="ti ti-map-pin"></i> ${listing.district}, ${listing.city}</div>
            <div class="lmid">
              ${getScoreBadge(listing.ratingAverage)}
              <span class="review-label">${listing.reviewCount > 0 ? `${listing.reviewCount} review${listing.reviewCount !== 1 ? 's' : ''}` : 'No reviews'}</span>
            </div>
            ${listing.amenities && listing.amenities.length > 0 ? `
            <div class="amenities">
              ${listing.amenities.slice(0, 3).map(a => `<span class="apill-card">${a}</span>`).join('')}
            </div>` : ''}
            <div class="lrow">
              <div class="lprice">K${listing.price} <sub>/night</sub></div>
              <span class="vbadge"><i class="ti ti-rosette-discount-check"></i> Verified</span>
            </div>
          </div>
        </a>
      `;
    }

    async function loadListings() {
      const grid = document.getElementById('listingsGrid');
      const countEl = document.getElementById('resultsCount');
      try {
        currentFilters.limit = 10;
        currentFilters.offset = 0;
        const listings = await api.getListings(currentFilters);
        allListings = listings || [];
        countEl.innerText = `${allListings.length} stay${allListings.length !== 1 ? 's' : ''} found`;
        grid.innerHTML = '';
        if (allListings.length === 0) {
          grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted-soft);font-size:14px;">No stays found. Try a different search.</div>';
          return;
        }
        allListings.forEach(l => grid.insertAdjacentHTML('beforeend', renderListingCard(l)));
        if (allListings.length >= 10) {
          grid.insertAdjacentHTML('afterend', '<div class="load-more-wrap"><button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()"><i class="ti ti-plus"></i> Load More</button></div>');
        }
      } catch (err) {
        countEl.innerText = 'Failed to load stays';
        console.error(err);
      }
    }

    async function loadMore() {
      if (isLoadingMore) return;
      isLoadingMore = true;
      const btn = document.getElementById('loadMoreBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = 'Loading...'; }
      try {
        currentFilters.offset = allListings.length;
        currentFilters.limit = 10;
        const more = await api.getListings(currentFilters);
        const grid = document.getElementById('listingsGrid');
        const existingBtn = document.getElementById('loadMoreBtn')?.closest('.load-more-wrap');
        if (existingBtn) existingBtn.remove();
        if (more && more.length > 0) {
          more.forEach(l => {
            allListings.push(l);
            grid.insertAdjacentHTML('beforeend', renderListingCard(l));
          });
          grid.insertAdjacentHTML('afterend', '<div class="load-more-wrap"><button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()"><i class="ti ti-plus"></i> Load More</button></div>');
        }
      } catch (err) { console.error(err); }
      isLoadingMore = false;
    }

    function applyFilters() {
      currentFilters.city = document.getElementById('citySearch').value;
      loadListings();
    }

    function applySort() {
      currentFilters.sort = document.getElementById('sortSelect').value;
      loadListings();
    }

    document.getElementById('typeFilters').addEventListener('click', (e) => {
      if (e.target.classList.contains('fchip')) {
        document.querySelectorAll('.fchip').forEach(c => c.classList.remove('on'));
        e.target.classList.add('on');
        currentFilters.type = e.target.dataset.type;
        loadListings();
      }
    });

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('city')) {
      document.getElementById('citySearch').value = urlParams.get('city');
      currentFilters.city = urlParams.get('city');
    }
    if (urlParams.has('sort')) {
      currentFilters.sort = urlParams.get('sort');
      document.getElementById('sortSelect').value = currentFilters.sort;
    }
    loadListings();

    /* ---- NAV HIDE ON SCROLL ---- */
    let lastScroll = 0;
    const nav = document.querySelector('nav');
    const searchHeader = document.querySelector('.search-header');
    window.addEventListener('scroll', () => {
      const currentScroll = window.scrollY;
      if (currentScroll > lastScroll && currentScroll > 80) {
        nav.classList.add('hidden');
        searchHeader.classList.add('hidden');
      } else {
        nav.classList.remove('hidden');
        searchHeader.classList.remove('hidden');
      }
      lastScroll = currentScroll;
    });
  </script>
</body>
</html>
