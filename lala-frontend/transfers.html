<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lala — Transfers & Taxis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <link rel="icon" type="image/png" href="logo-removebg-preview.png">
  <style>
    body { background: var(--bg); }
    .tnav { background: var(--g-dark); padding: 14px 18px; color: #fff; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 12px; }
    .tnav a { color: #fff; text-decoration: none; font-size: 20px; }
    .tnav h1 { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 600; margin: 0; }

    .hero-pick {
      background: linear-gradient(135deg, #1B5E20, #2E7D32); color: #fff;
      padding: 24px 18px; text-align: center;
    }
    .hero-pick h2 { font-family: 'Sora', sans-serif; font-size: 20px; margin: 0 0 4px; }
    .hero-pick p { margin: 0 0 16px; font-size: 13px; opacity: 0.85; }

    .type-toggle { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
    .type-btn { padding: 8px 20px; border-radius: 99px; border: 1.5px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: #fff; font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .type-btn.on { background: #fff; color: #1B5E20; border-color: #fff; }

    .city-input-wrap { display: flex; background: rgba(255,255,255,0.15); border-radius: 12px; padding: 10px 14px; align-items: center; gap: 10px; max-width: 320px; margin: 0 auto; }
    .city-input-wrap i { color: rgba(255,255,255,0.7); font-size: 18px; }
    .city-input-wrap input { background: transparent; border: none; color: #fff; font-size: 14px; width: 100%; outline: none; font-family: 'DM Sans', sans-serif; }
    .city-input-wrap input::placeholder { color: rgba(255,255,255,0.5); }

    .results { padding: 20px 18px; display: flex; flex-direction: column; gap: 14px; }
    .ccard { background: var(--card); border-radius: var(--r); border: 1px solid var(--border); overflow: hidden; }
    .cimg { height: 120px; background: linear-gradient(135deg, #A5D6A7, #66BB6A); display: flex; align-items: center; justify-content: center; font-size: 40px; color: #fff; position: relative; }
    .cimg img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .cbody { padding: 14px; }
    .cmodel { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 15px; }
    .cdriver { font-size: 12px; color: #666; margin: 2px 0 6px; }
    .cbadges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .cbadge { padding: 2px 10px; border-radius: 99px; font-size: 10px; font-weight: 600; font-family: 'Sora', sans-serif; background: #E8F5E9; color: #1B5E20; }
    .cprices { display: flex; gap: 14px; font-size: 12px; color: #555; }
    .cprices strong { color: var(--text); font-size: 14px; }
    .cbook { display: block; margin-top: 10px; text-align: center; padding: 10px; background: var(--g-dark); color: #fff; border-radius: 8px; text-decoration: none; font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 600; }

    .empty { text-align: center; padding: 60px 20px; color: #888; }
    .empty i { font-size: 48px; color: #DDD; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="tnav">
    <a href="index.html"><i class="ti ti-arrow-left"></i></a>
    <h1>Transfers & Taxis</h1>
  </div>

  <div class="hero-pick">
    <h2>Where to?</h2>
    <p>Airport transfers & city rides</p>
    <div class="type-toggle">
      <button class="type-btn on" data-type="" onclick="setType(this)">All</button>
      <button class="type-btn" data-type="airport" onclick="setType(this)">Airport</button>
      <button class="type-btn" data-type="city" onclick="setType(this)">City</button>
    </div>
    <div class="city-input-wrap">
      <i class="ti ti-map-pin"></i>
      <input type="text" id="cityInput" placeholder="Search city..." oninput="loadCars()">
    </div>
  </div>

  <div class="results" id="results">
    <div class="empty"><i class="ti ti-car"></i><p>Loading drivers...</p></div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    let activeType = '';

    function setType(btn) {
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      activeType = btn.dataset.type;
      loadCars();
    }

    async function loadCars() {
      const container = document.getElementById('results');
      const city = document.getElementById('cityInput').value;
      const filters = {};
      if (city) filters.city = city;

      try {
        let cars = await api.getCars(filters);
        if (activeType === 'airport') cars = cars.filter(c => c.airportPrice);
        else if (activeType === 'city') cars = cars.filter(c => c.pricePerKm);

        if (!cars.length) {
          container.innerHTML = '<div class="empty"><i class="ti ti-car-off"></i><p>No drivers found in this area</p></div>';
          return;
        }

        container.innerHTML = cars.map(c => `
          <div class="ccard">
            <div class="cimg">${c.photos && c.photos[0] ? `<img src="${c.photos[0]}" alt="">` : '🚗'}</div>
            <div class="cbody">
              <div class="cmodel">${c.model}</div>
              <div class="cdriver">👤 ${c.driverName} · ${c.plateNumber} · ${c.seats} seats</div>
              <div class="cbadges">
                ${c.airportPrice ? '<span class="cbadge">Airport</span>' : ''}
                ${c.pricePerKm ? '<span class="cbadge">City</span>' : ''}
                <span class="cbadge">${c.city}</span>
              </div>
              <div class="cprices">
                ${c.airportPrice ? `<span>Airport: <strong>K${c.airportPrice}</strong></span>` : ''}
                ${c.pricePerKm ? `<span>Per km: <strong>K${c.pricePerKm}</strong></span>` : ''}
              </div>
              <a href="car-detail.html?id=${c.id}" class="cbook">Book Now</a>
            </div>
          </div>
        `).join('');
      } catch (err) {
        container.innerHTML = '<div class="empty"><p style="color:red;">Failed to load</p></div>';
      }
    }

    loadCars();
  </script>
</body>
</html>
