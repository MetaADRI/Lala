<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lala — Listing Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <link rel="icon" type="image/png" href="logo-removebg-preview.png">
  <style>
    body { background: var(--bg); padding-bottom: 100px; }

    /* ── IMAGE HEADER ──────────────────────────────────────────────── */
    .detail-img {
      height: 220px; position: relative; overflow: hidden;
      background: linear-gradient(135deg, #A5D6A7, #388E3C);
      display: flex; align-items: center; justify-content: center; font-size: 70px;
    }
    .detail-img img.hero-photo {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }
    .detail-back {
      position: absolute; top: 16px; left: 16px; width: 36px; height: 36px;
      border-radius: 50%; background: rgba(0,0,0,0.38); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      color: #fff; text-decoration: none; z-index: 2; font-size: 18px;
    }
    .detail-save {
      position: absolute; top: 16px; right: 16px; width: 36px; height: 36px;
      border-radius: 50%; background: rgba(0,0,0,0.38); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      color: #fff; z-index: 2; font-size: 18px; cursor: pointer;
      transition: background 0.2s;
    }
    .detail-save.saved { background: #C62828; }
    .logo-overlay {
      position: absolute; top: 16px; left: 62px; z-index: 2;
    }

    /* ── BODY SECTIONS ─────────────────────────────────────────────── */
    .detail-body { padding: 0 18px 20px; display: flex; flex-direction: column; gap: 16px; }

    .name-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 20px 18px 0; gap: 12px;
    }
    .listing-title { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 20px; color: var(--text); }
    .price-block { text-align: right; flex-shrink: 0; }
    .price-main { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 26px; color: var(--g-dark); }
    .price-sub { font-size: 11px; color: var(--muted); }

    /* ── DATES CARD ─────────────────────────────────────────────────── */
    .dates-card {
      background: var(--card); border-radius: var(--r); border: 1px solid var(--border);
      padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .dates-title { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 14px; margin-bottom: 12px; }
    .dates-row { display: flex; gap: 10px; }
    .date-field {
      flex: 1; background: var(--bg); border-radius: 10px; padding: 10px 12px;
      border: 1.5px solid var(--border); transition: border-color 0.2s;
    }
    .date-field:focus-within { border-color: var(--g-dark); }
    .date-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
    .date-field input[type="date"] {
      border: none; background: transparent; font-family: 'Sora', sans-serif;
      font-weight: 600; font-size: 13px; color: var(--text); outline: none; width: 100%; cursor: pointer;
    }

    /* ── TOTAL CALC ──────────────────────────────────────────────────── */
    .price-summary {
      background: var(--g-light); border-radius: 10px; padding: 12px 14px;
      display: none; /* shown via JS when dates are selected */
      justify-content: space-between; align-items: center;
      border: 1px solid rgba(46,125,50,0.15);
    }
    .price-summary.visible { display: flex; }
    .ps-label { font-size: 12px; color: var(--g-mid); }
    .ps-total { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 16px; color: var(--g-dark); }

    /* ── INFO CARD ───────────────────────────────────────────────────── */
    .info-card {
      background: var(--card); border-radius: var(--r); border: 1px solid var(--border);
      padding: 16px;
    }
    .info-title { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 14px; margin-bottom: 10px; }
    .arow { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── HOST ROW ────────────────────────────────────────────────────── */
    .host-row {
      background: var(--card); border-radius: var(--r); border: 1px solid var(--border);
      padding: 14px; display: flex; align-items: center; gap: 12px;
    }
    .host-av {
      width: 44px; height: 44px; border-radius: 50%; background: var(--g-dark);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-family: 'Sora', sans-serif; font-size: 16px; flex-shrink: 0;
    }
    .host-name { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 14px; }
    .host-phone { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── REVIEWS ─────────────────────────────────────────────────────── */
    .rcard {
      background: var(--card); border-radius: var(--rsm); border: 1px solid var(--border);
      padding: 14px; margin-top: 8px;
    }
    .rav {
      width: 32px; height: 32px; border-radius: 50%; background: var(--g-light);
      color: var(--g-dark); display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; font-family: 'Sora', sans-serif;
    }
    .rstars { color: var(--gold); font-size: 12px; margin-top: 1px; }
    .rtext { font-size: 13px; color: var(--text); margin-top: 8px; line-height: 1.5; }

    /* Star rating interactives */
    .star-rating span {
      transition: transform 0.15s, color 0.15s;
    }
    .star-rating span:hover {
      transform: scale(1.2);
    }

    /* ── STICKY ACTION BAR ───────────────────────────────────────────── */
    .action-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.96); backdrop-filter: blur(10px);
      border-top: 1px solid var(--border); padding: 12px 18px 20px;
      display: flex; gap: 10px; z-index: 50;
    }
    .action-bar .btn-green { flex: 1; }
    .action-bar .btn-gold { flex: 1; }

    /* Date unavailability */
    input[type="date"]::-webkit-calendar-picker-indicator { 
      opacity: 0.5; cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- IMAGE HEADER (populated by JS) -->
  <div class="detail-img" id="heroImg">
    <i class="ti ti-building-estate" id="heroIcon"></i>
    <a href="search.html" class="detail-back"><i class="ti ti-arrow-left"></i></a>
    <div class="logo-overlay">
      <img src="logo-removebg-preview.png" alt="Lala" style="height: 22px; filter: brightness(0) invert(1);">
    </div>
    <div class="detail-save" id="saveBtn" onclick="toggleSave()"><i class="ti ti-heart"></i></div>
  </div>

  <!-- NAME + PRICE (populated by JS) -->
  <div class="name-row fade-up" id="nameRow" style="display:none;">
    <div>
      <div class="listing-title" id="listingName">Loading...</div>
      <div style="display:flex; gap:6px; margin-top:6px; flex-wrap:wrap;" id="badgeRow"></div>
    </div>
    <div class="price-block">
      <div class="price-main" id="listingPrice">K—</div>
      <div class="price-sub">/night</div>
    </div>
  </div>

  <!-- BODY CONTENT -->
  <div class="detail-body">

    <!-- DATE PICKER CARD -->
    <div class="dates-card fade-up" id="datesCard" style="display:none;">
      <div class="dates-title"><i class="ti ti-calendar" style="color:var(--g-dark);"></i> Select your dates</div>
      <div class="dates-row">
        <div class="date-field">
          <div class="date-label">Check-in</div>
          <input type="date" id="checkIn" onchange="recalculate()">
        </div>
        <div class="date-field">
          <div class="date-label">Check-out</div>
          <input type="date" id="checkOut" onchange="recalculate()">
        </div>
      </div>
      <div class="price-summary" id="priceSummary">
        <div class="ps-label" id="nightsLabel">— nights</div>
        <div class="ps-total" id="totalPrice">K—</div>
      </div>
    </div>

    <!-- LOCATION / DESCRIPTION -->
    <div class="info-card fade-up" id="locationCard" style="display:none;">
      <div class="info-title"><i class="ti ti-map-pin" style="color:var(--g-dark);"></i> Location</div>
      <div style="font-size:14px; color:var(--muted);" id="locationText"></div>
      <div style="font-size:13px; color:var(--text); margin-top:8px; line-height:1.6;" id="descriptionText"></div>
    </div>

    <!-- AMENITIES -->
    <div class="info-card fade-up" id="amenitiesCard" style="display:none;">
      <div class="info-title"><i class="ti ti-check" style="color:var(--g-dark);"></i> Amenities</div>
      <div class="arow" id="amenitiesRow"></div>
    </div>

    <!-- HOST INFO -->
    <div class="host-row fade-up" id="hostRow" style="display:none;">
      <div class="host-av" id="hostInitials">?</div>
      <div>
        <div class="host-name" id="hostName">Host</div>
        <div class="host-phone" id="hostPhone"></div>
      </div>
      <div style="margin-left:auto;">
        <div class="vbadge"><i class="ti ti-rosette-discount-check"></i> Verified</div>
      </div>
    </div>

    <!-- REVIEWS -->
    <div class="fade-up" id="reviewsSection" style="display:none;">
      <div class="info-title" style="font-family:'Sora',sans-serif; font-weight:600; font-size:14px;">
        <i class="ti ti-star-filled" style="color:var(--gold);"></i> Guest Reviews
        <span style="font-size:11px; color:var(--muted); font-weight:400;" id="ratingBadge"></span>
      </div>
      <!-- Dynamic review cards will be appended here -->
    </div>

    <!-- REVIEW SUBMISSION FORM (shown only if logged-in guest has a confirmed stay) -->
    <div class="fade-up" id="reviewFormCard" style="display:none; margin-top: 24px; margin-bottom: 24px;">
      <div class="info-title" style="font-family:'Sora',sans-serif; font-weight:600; font-size:14px;">
        <i class="ti ti-edit" style="color:var(--g-dark);"></i> Write a Review
      </div>
      <div class="rcard" style="padding: 18px; border-color: rgba(46, 125, 50, 0.3);">
        <form id="submitReviewForm" onsubmit="handleReviewSubmit(event)">
          <div style="margin-bottom: 14px;">
            <label style="display:block; font-size:12px; font-weight:600; margin-bottom: 6px; color:var(--muted);">Your Rating</label>
            <div class="star-rating" style="display:flex; gap:8px; font-size:28px; color:#ccc; cursor:pointer;">
              <span data-val="1" onclick="setRating(1)" onmouseover="highlightStars(1)" onmouseout="resetStars()">★</span>
              <span data-val="2" onclick="setRating(2)" onmouseover="highlightStars(2)" onmouseout="resetStars()">★</span>
              <span data-val="3" onclick="setRating(3)" onmouseover="highlightStars(3)" onmouseout="resetStars()">★</span>
              <span data-val="4" onclick="setRating(4)" onmouseover="highlightStars(4)" onmouseout="resetStars()">★</span>
              <span data-val="5" onclick="setRating(5)" onmouseover="highlightStars(5)" onmouseout="resetStars()">★</span>
            </div>
            <input type="hidden" id="reviewRating" name="rating" value="">
          </div>
          <div style="margin-bottom: 14px;">
            <label for="reviewComment" style="display:block; font-size:12px; font-weight:600; margin-bottom: 6px; color:var(--muted);">Your Comment</label>
            <textarea id="reviewComment" class="input-field" placeholder="Share your experience staying here..." style="min-height: 80px; font-family: inherit; resize: vertical;" required></textarea>
          </div>
          <button type="submit" class="btn-green" id="submitReviewBtn" style="width:100%;">Submit Review</button>
        </form>
      </div>
    </div>
  </div>

  <!-- STICKY ACTION BAR -->
  <div class="action-bar" id="actionBar" style="display:none;">
    <button class="btn-green" id="whatsappBtn" onclick="handleWhatsAppBooking()">
      <i class="ti ti-brand-whatsapp"></i> Book via WhatsApp
    </button>
    <button class="btn-gold" id="payBtn" onclick="handlePayNow()">
      <i class="ti ti-device-mobile"></i> Pay Now
    </button>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    let listing = null;
    let pricePerNight = 0;
    let isSaved = false;

    // ── Set today + tomorrow as default dates ──────────────────────────
    function initDates() {
      const today = new Date();
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const fmt = d => d.toISOString().split('T')[0];
      document.getElementById('checkIn').min = fmt(today);
      document.getElementById('checkIn').value = fmt(today);
      document.getElementById('checkOut').min = fmt(tomorrow);
      document.getElementById('checkOut').value = fmt(tomorrow);
      recalculate();
    }

    // ── Recalculate total when dates change ────────────────────────────
    function recalculate() {
      const ci = document.getElementById('checkIn').value;
      const co = document.getElementById('checkOut').value;
      const summary = document.getElementById('priceSummary');
      const checkOut = document.getElementById('checkOut');

      if (!ci || !co) { summary.classList.remove('visible'); return; }

      const ciDate = new Date(ci);
      const coDate = new Date(co);

      // Force checkout to be after checkin
      if (coDate <= ciDate) {
        const next = new Date(ciDate);
        next.setDate(next.getDate() + 1);
        checkOut.value = next.toISOString().split('T')[0];
        checkOut.min = checkOut.value;
      }

      const nights = Math.max(1, Math.ceil((new Date(checkOut.value) - ciDate) / (1000 * 60 * 60 * 24)));
      const total = nights * pricePerNight;

      document.getElementById('nightsLabel').textContent = `${nights} night${nights > 1 ? 's' : ''} × K${pricePerNight}`;
      document.getElementById('totalPrice').textContent = `K${total.toLocaleString()}`;
      summary.classList.add('visible');

      // Update pay button text
      const payBtn = document.getElementById('payBtn');
      if (payBtn) payBtn.innerHTML = `<i class="ti ti-device-mobile"></i> Pay K${total.toLocaleString()}`;
    }

    // ── Toggle save ────────────────────────────────────────────────────
    function toggleSave() {
      isSaved = !isSaved;
      const btn = document.getElementById('saveBtn');
      btn.innerHTML = isSaved ? '<i class="ti ti-heart-filled" style="color:#ff6b6b;"></i>' : '<i class="ti ti-heart"></i>';
      btn.classList.toggle('saved', isSaved);
    }

    // ── WhatsApp deep-link booking ─────────────────────────────────────
    function handleWhatsAppBooking() {
      if (!listing) return;
      const name = listing.name;
      const hostPhone = listing.hostPhone || '260977000111'; // fallback only if missing
      const checkIn = document.getElementById('checkIn').value || '(date TBD)';
      const checkOut = document.getElementById('checkOut').value || '(date TBD)';

      const message = `Hi, I'd like to book ${name} from ${checkIn} to ${checkOut} for 1 guest(s). Is it available? (via Lala)`;
      const encoded = encodeURIComponent(message);

      window.open(`https://wa.me/${hostPhone}?text=${encoded}`, '_blank');
    }

    // ── Mobile Money pay flow ──────────────────────────────────────────
    function handlePayNow() {
      const checkIn = document.getElementById('checkIn').value;
      const checkOut = document.getElementById('checkOut').value;

      if (!checkIn || !checkOut) {
        alert('Please select your check-in and check-out dates first.');
        return;
      }

      if (!api.isLoggedIn()) {
        // Save intent and redirect to guest login
        sessionStorage.setItem('booking_intent', JSON.stringify({
          listingId: listing.id, checkIn, checkOut
        }));
        window.location.href = `guest-login.html?redirect=${encodeURIComponent(`listing-detail.html?id=${listing.id}`)}`;
        return;
      }

      // Build payment URL with all parameters
      const nights = Math.max(1, Math.ceil((new Date(checkOut) - new Date(checkIn)) / (1000 * 60 * 60 * 24)));
      const total = nights * pricePerNight;

      const params = new URLSearchParams({
        id: listing.id,
        name: listing.name,
        checkIn,
        checkOut,
        nights,
        total,
        hostPhone: listing.hostPhone || ''
      });

      window.location.href = `payment.html?${params.toString()}`;
    }

    // ── Load listing from API ──────────────────────────────────────────
    async function loadListingDetail() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');

      if (!id) {
        document.body.innerHTML = '<div style="padding:40px;text-align:center;">No listing ID provided.</div>';
        return;
      }

      try {
        listing = await api.getListing(id);
        if (listing.error) throw new Error(listing.error);

        pricePerNight = listing.price;
        document.title = `Lala — ${listing.name}`;

        // Hero image
        const heroImg = document.getElementById('heroImg');
        if (listing.photos && listing.photos.length > 0) {
          heroImg.style.backgroundImage = `url('${listing.photos[0]}')`;
          heroImg.style.backgroundSize = 'cover';
          heroImg.style.backgroundPosition = 'center';
          document.getElementById('heroIcon').style.display = 'none';
        }

        // Name + Price row
        document.getElementById('listingName').textContent = listing.name;
        document.getElementById('listingPrice').textContent = `K${listing.price}`;
        
        // Title & type
        const dynamicRatingText = listing.ratingAverage > 0 
          ? `${listing.ratingAverage.toFixed(1)} (${listing.reviewCount} review${listing.reviewCount !== 1 ? 's' : ''})` 
          : 'New';
        document.getElementById('badgeRow').innerHTML = `
          <div class="vbadge"><i class="ti ti-rosette-discount-check"></i> Verified</div>
          <div class="star-badge"><i class="ti ti-star-filled"></i> ${dynamicRatingText}</div>
          <div class="apill"><i class="ti ti-home"></i> ${listing.type}</div>
        `;
        document.getElementById('nameRow').style.display = 'flex';

        // Location card
        document.getElementById('locationText').textContent = `${listing.district}, ${listing.city}, Zambia`;
        document.getElementById('descriptionText').textContent = listing.description || 'A comfortable and affordable stay in the heart of the city, close to public transport and local amenities.';
        document.getElementById('locationCard').style.display = 'block';

        // Amenities
        if (listing.amenities && listing.amenities.length > 0) {
          const icons = { 'Wi-Fi': 'ti-wifi', 'Parking': 'ti-parking', 'Hot Water': 'ti-droplet', 'Security': 'ti-shield', 'CCTV': 'ti-camera', 'Generator': 'ti-bolt', 'Breakfast': 'ti-egg', 'TV': 'ti-tv' };
          document.getElementById('amenitiesRow').innerHTML = listing.amenities
            .map(a => `<div class="apill"><i class="ti ${icons[a] || 'ti-check'}"></i> ${a}</div>`).join('');
          document.getElementById('amenitiesCard').style.display = 'block';
        }

        // Host row
        const hostPhone = listing.hostPhone || '';
        document.getElementById('hostInitials').textContent = listing.name ? listing.name[0].toUpperCase() : 'H';
        document.getElementById('hostName').textContent = 'Verified Host';
        document.getElementById('hostPhone').textContent = hostPhone ? `+${hostPhone}` : 'Contact via WhatsApp';
        document.getElementById('hostRow').style.display = 'flex';

        // Reviews
        const reviewText = listing.reviewCount > 0 
          ? ` — ${listing.ratingAverage.toFixed(1)} avg (${listing.reviewCount} review${listing.reviewCount !== 1 ? 's' : ''})` 
          : ' — No reviews yet';
        document.getElementById('ratingBadge').textContent = reviewText;
        document.getElementById('reviewsSection').style.display = 'block';

        // Load dynamic reviews
        await loadReviews();

        // Check if guest can review
        if (api.isLoggedIn()) {
          try {
            const check = await api.checkCanReview(listing.id);
            if (check.canReview && !check.alreadyReviewed) {
              document.getElementById('reviewFormCard').style.display = 'block';
            } else {
              document.getElementById('reviewFormCard').style.display = 'none';
            }
          } catch (err) {
            console.error('Error checking review privileges:', err);
          }
        }

        // Dates card
        document.getElementById('datesCard').style.display = 'block';
        initDates();

        // Action bar
        document.getElementById('actionBar').style.display = 'flex';

        // Animate everything
        document.querySelectorAll('.fade-up').forEach(el => {
          setTimeout(() => el.classList.add('visible'), 50);
        });

      } catch (err) {
        document.getElementById('heroIcon').style.fontSize = '40px';
        document.querySelector('.detail-body').innerHTML = `
          <div style="text-align:center; padding:40px; color:var(--muted);">
            <i class="ti ti-alert-circle" style="font-size:40px;"></i>
            <div style="margin-top:12px; font-family:'Sora',sans-serif;">Failed to load listing details.</div>
            <a href="search.html" class="btn-outline" style="margin-top:16px; display:inline-flex;">Back to Search</a>
          </div>`;
        console.error(err);
      }
    }

    // ── Review UI Helpers ──────────────────────────────────────────────
    let selectedRating = 0;
    
    window.setRating = function(rating) {
      selectedRating = rating;
      document.getElementById('reviewRating').value = rating;
      updateStars(rating);
    }
    
    window.highlightStars = function(rating) {
      updateStars(rating);
    }
    
    window.resetStars = function() {
      updateStars(selectedRating);
    }
    
    function updateStars(rating) {
      const stars = document.querySelectorAll('.star-rating span');
      stars.forEach((star, idx) => {
        if (idx < rating) {
          star.style.color = 'var(--gold)';
        } else {
          star.style.color = '#ccc';
        }
      });
    }

    async function loadReviews() {
      try {
        const reviews = await api.getReviews(listing.id);
        const reviewsContainer = document.getElementById('reviewsSection');
        
        // Remove existing review cards (elements with class .rcard)
        const existingCards = reviewsContainer.querySelectorAll('.rcard');
        existingCards.forEach(card => card.remove());
        
        const noRev = reviewsContainer.querySelector('.no-reviews-card');
        if (noRev) noRev.remove();

        if (reviews.length === 0) {
          reviewsContainer.insertAdjacentHTML('beforeend', `
            <div class="rcard no-reviews-card" style="text-align: center; padding: 20px; color: var(--muted); border-style: dashed;">
              No reviews yet. Be the first to leave a review!
            </div>
          `);
        } else {
          reviews.forEach(r => {
            const guestName = r.guest ? r.guest.name || r.guest.phone || 'Anonymous' : 'Anonymous';
            const initials = guestName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
            
            // Build stars string
            const fullStars = '★'.repeat(r.rating);
            const emptyStars = '☆'.repeat(5 - r.rating);
            
            reviewsContainer.insertAdjacentHTML('beforeend', `
              <div class="rcard">
                <div style="display:flex; align-items:center; gap:10px;">
                  <div class="rav">${initials}</div>
                  <div>
                    <div style="font-family:'Sora',sans-serif; font-weight:600; font-size:12px;">${guestName}</div>
                    <div class="rstars">${fullStars}${emptyStars}</div>
                  </div>
                  <div style="margin-left: auto; font-size: 10px; color: var(--muted);">
                    ${new Date(r.createdAt).toLocaleDateString()}
                  </div>
                </div>
                <p class="rtext">"${r.comment || ''}"</p>
              </div>
            `);
          });
        }
      } catch (err) {
        console.error('Failed to load reviews:', err);
      }
    }

    window.handleReviewSubmit = async function(e) {
      e.preventDefault();
      const ratingVal = document.getElementById('reviewRating').value;
      const commentVal = document.getElementById('reviewComment').value.trim();
      
      if (!ratingVal) {
        alert('Please select a star rating.');
        return;
      }
      
      const btn = document.getElementById('submitReviewBtn');
      btn.disabled = true;
      btn.innerText = 'Submitting...';
      
      try {
        const result = await api.createReview({
          listingId: listing.id,
          rating: parseInt(ratingVal, 10),
          comment: commentVal
        });
        
        if (result.error) {
          throw new Error(result.error);
        }
        
        alert('Thank you! Your review has been submitted.');
        
        // Hide review form and reload
        document.getElementById('reviewFormCard').style.display = 'none';
        
        // Reload listing details to get updated average rating
        await loadListingDetail();
        
      } catch (err) {
        alert(err.message || 'Failed to submit review. Please try again.');
        btn.disabled = false;
        btn.innerText = 'Submit Review';
      }
    }

    loadListingDetail();
  </script>
</body>
</html>
