<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lala — Book Transfer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <link rel="icon" type="image/png" href="logo-removebg-preview.png">
  <style>
    body { background: var(--bg); }
    .tnav { background: var(--g-dark); padding: 14px 18px; color: #fff; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 12px; }
    .tnav a { color: #fff; text-decoration: none; font-size: 20px; }
    .tnav h1 { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 600; margin: 0; }
    .detail { padding: 20px 18px; max-width: 480px; margin: 0 auto; }
    .dimg { height: 180px; background: linear-gradient(135deg, #A5D6A7, #66BB6A); border-radius: var(--r); display: flex; align-items: center; justify-content: center; font-size: 56px; color: #fff; margin-bottom: 16px; overflow: hidden; }
    .dimg img { width: 100%; height: 100%; object-fit: cover; }
    .dmodel { font-family: 'Sora', sans-serif; font-size: 20px; font-weight: 700; }
    .dinfo { font-size: 13px; color: #666; margin: 4px 0 16px; }
    .dprices { display: flex; gap: 16px; margin-bottom: 20px; }
    .dprice { background: var(--card); border: 1px solid var(--border); border-radius: var(--rsm); padding: 12px 16px; flex: 1; text-align: center; }
    .dprice .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: #888; font-family: 'Sora', sans-serif; }
    .dprice .value { font-size: 18px; font-weight: 700; color: var(--g-dark); }
    .section-title { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; margin: 20px 0 10px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; font-family: 'Sora', sans-serif; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--rsm); font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; background: var(--card); box-sizing: border-box; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--g-dark); }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }
    .book-btn { width: 100%; padding: 14px; background: var(--g-dark); color: #fff; border: none; border-radius: var(--rsm); font-size: 14px; font-weight: 700; font-family: 'Sora', sans-serif; cursor: pointer; margin-top: 8px; }
    .book-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { padding: 12px; border-radius: var(--rsm); font-size: 13px; margin-top: 12px; display: none; }
    .msg.ok { background: #E8F5E9; color: #1B5E20; display: block; }
    .msg.err { background: #FFEBEE; color: #C62828; display: block; }
  </style>
</head>
<body>
  <div class="tnav">
    <a href="transfers.html"><i class="ti ti-arrow-left"></i></a>
    <h1>Book Transfer</h1>
  </div>

  <div class="detail" id="detail">
    <div class="dimg" id="carImg">🚗</div>
    <div class="dmodel" id="carModel">Loading...</div>
    <div class="dinfo" id="carInfo"></div>
    <div class="dprices" id="carPrices"></div>

    <div class="section-title">Booking Details</div>

    <div class="form-group">
      <label>Trip Type</label>
      <select id="tripType" onchange="toggleTripType()">
        <option value="airport">Airport Transfer (fixed price)</option>
        <option value="city">City Ride (per km)</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Pickup Location</label>
        <input type="text" id="pickupLocation" placeholder="e.g. Airport, Hotel...">
      </div>
      <div class="form-group">
        <label>Drop-off</label>
        <input type="text" id="dropoffLocation" placeholder="Destination...">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="pickupDate">
      </div>
      <div class="form-group">
        <label>Time</label>
        <input type="time" id="pickupTime">
      </div>
    </div>

    <div class="form-group" id="flightGroup" style="display:none;">
      <label>Flight Number (optional)</label>
      <input type="text" id="flightNumber" placeholder="e.g. ET 873">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Passengers</label>
        <input type="number" id="passengerCount" value="1" min="1">
      </div>
      <div class="form-group">
        <label>Your Phone</label>
        <input type="text" id="guestPhone" placeholder="+260...">
      </div>
    </div>

    <div class="form-group">
      <label>Notes (optional)</label>
      <textarea id="notes" rows="2" placeholder="Luggage, special requests..."></textarea>
    </div>

    <button class="book-btn" onclick="book()" id="bookBtn">Confirm Booking</button>
    <div id="msg" class="msg"></div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const carId = params.get('id');
    let car = null;

    if (!api.isLoggedIn()) {
      document.getElementById('detail').innerHTML = '<div class="empty" style="text-align:center;padding:60px 20px;color:#888;"><p>Please <a href="guest-login.html" style="color:var(--g-dark);">log in</a> to book a transfer.</p></div>';
    }

    async function loadCar() {
      try {
        car = await api.getCar(carId);
        document.getElementById('carModel').textContent = car.model;
        document.getElementById('carInfo').textContent = `👤 ${car.driverName} · ${car.plateNumber} · ${car.seats} seats · ${car.city}`;
        document.getElementById('carImg').innerHTML = car.photos && car.photos[0] ? `<img src="${car.photos[0]}" alt="">` : '🚗';

        let html = '';
        if (car.airportPrice) html += `<div class="dprice"><div class="label">Airport</div><div class="value">K${car.airportPrice}</div></div>`;
        if (car.pricePerKm) html += `<div class="dprice"><div class="label">Per km</div><div class="value">K${car.pricePerKm}</div></div>`;
        document.getElementById('carPrices').innerHTML = html;

        // Set default date to tomorrow
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('pickupDate').value = tomorrow.toISOString().split('T')[0];

        // Pre-fill phone from user
        const user = api.getUser();
        if (user) document.getElementById('guestPhone').value = user.phone || '';

        toggleTripType();
      } catch (err) {
        document.getElementById('carModel').textContent = 'Failed to load';
      }
    }

    function toggleTripType() {
      const type = document.getElementById('tripType').value;
      document.getElementById('flightGroup').style.display = type === 'airport' ? 'block' : 'none';
    }

    async function book() {
      const msg = document.getElementById('msg');
      const btn = document.getElementById('bookBtn');
      btn.disabled = true;

      const data = {
        carId,
        tripType: document.getElementById('tripType').value,
        pickupLocation: document.getElementById('pickupLocation').value,
        dropoffLocation: document.getElementById('dropoffLocation').value,
        pickupDate: document.getElementById('pickupDate').value,
        pickupTime: document.getElementById('pickupTime').value,
        passengerCount: parseInt(document.getElementById('passengerCount').value) || 1,
        guestPhone: document.getElementById('guestPhone').value,
        notes: document.getElementById('notes').value
      };

      if (data.tripType === 'airport') data.flightNumber = document.getElementById('flightNumber').value;

      if (!data.pickupLocation || !data.dropoffLocation || !data.pickupDate || !data.pickupTime) {
        msg.className = 'msg err';
        msg.textContent = 'Please fill in all required fields';
        btn.disabled = false;
        return;
      }

      try {
        const result = await api.createCarBooking(data);
        if (result.error) {
          msg.className = 'msg err';
          msg.textContent = result.error;
        } else {
          msg.className = 'msg ok';
          msg.textContent = '✅ Transfer booked! The driver will contact you.';
          btn.textContent = 'Booked ✓';
        }
      } catch (err) {
        msg.className = 'msg err';
        msg.textContent = 'Booking failed. Try again.';
      }
      btn.disabled = false;
    }

    if (carId) loadCar();
  </script>
</body>
</html>
