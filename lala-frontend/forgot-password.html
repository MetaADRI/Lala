<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lala — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <link rel="icon" type="image/png" href="logo-removebg-preview.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0F2B10 0%, #1B5E20 30%, #2E7D32 60%, #43A047 100%);
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.25);
      overflow: hidden;
      animation: cardEnter 0.8s ease-out;
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-header {
      background: linear-gradient(160deg, #1B5E20, #2E7D32, #388E3C);
      padding: 24px 28px 32px;
    }
    .header-title {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: #fff;
    }
    .header-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      margin-top: 6px;
    }
    .card-body {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .input-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .input-wrap {
      display: flex;
      align-items: center;
      background: #F5F7F4;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 0 14px;
      transition: all 0.25s;
    }
    .input-wrap:focus-within {
      border-color: var(--g-dark);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(27,94,32,0.08);
    }
    .input-wrap i {
      color: var(--muted);
      font-size: 18px;
      margin-right: 10px;
    }
    .input-wrap:focus-within i { color: var(--g-dark); }
    .input-wrap input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 14px 0;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
    }
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1B5E20, #2E7D32);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(27,94,32,0.3);
    }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-secondary {
      width: 100%;
      padding: 14px;
      background: #fff;
      color: var(--g-dark);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-secondary:hover { border-color: var(--g-mid); background: var(--g-light); }
    .error-msg {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #DC2626;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-msg.visible { display: flex; }
    .success-msg {
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      color: #15803D;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .success-msg.visible { display: flex; }
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .step { display: none; }
    .step.visible { display: flex; flex-direction: column; gap: 18px; }
    .back-link {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .back-link a { color: var(--g-dark); font-weight: 700; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <a href="guest-login.html" style="color:#fff;font-size:20px;text-decoration:none;"><i class="ti ti-arrow-left"></i></a>
        <span style="font-family:'Inter',sans-serif;font-weight:700;font-size:18px;color:#fff;">lala</span>
      </div>
      <div class="header-title">Reset Password</div>
      <div class="header-sub">We'll send you a reset code</div>
    </div>
    <div class="card-body">
      <div class="error-msg" id="errorMsg">
        <i class="ti ti-alert-circle"></i>
        <span id="errorText">Something went wrong</span>
      </div>
      <div class="success-msg" id="successMsg">
        <i class="ti ti-circle-check"></i>
        <span id="successText">Success!</span>
      </div>

      <!-- Step 1: Request code -->
      <div class="step visible" id="step1">
        <div class="input-group">
          <label>Email address</label>
          <div class="input-wrap">
            <i class="ti ti-mail"></i>
            <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
          </div>
        </div>
        <button class="btn-primary" id="sendCodeBtn" onclick="sendCode()">
          <i class="ti ti-send"></i> Send Reset Code
        </button>
      </div>

      <!-- Step 2: Enter code + new password -->
      <div class="step" id="step2">
        <div class="input-group">
          <label>Reset Code</label>
          <div class="input-wrap">
            <i class="ti ti-key"></i>
            <input type="text" id="codeInput" placeholder="Enter 6-digit code" maxlength="6">
          </div>
        </div>
        <div class="input-group">
          <label>New Password</label>
          <div class="input-wrap">
            <i class="ti ti-lock"></i>
            <input type="password" id="passwordInput" placeholder="Min. 6 characters">
          </div>
        </div>
        <div class="input-group">
          <label>Confirm New Password</label>
          <div class="input-wrap">
            <i class="ti ti-lock"></i>
            <input type="password" id="confirmInput" placeholder="Repeat password">
          </div>
        </div>
        <button class="btn-primary" id="resetBtn" onclick="resetPassword()">
          <i class="ti ti-check"></i> Reset Password
        </button>
      </div>

      <div class="back-link">
        <a href="guest-login.html"><i class="ti ti-arrow-left"></i> Back to Sign In</a>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    let resetEmail = '';

    function showError(msg) {
      document.getElementById('errorText').textContent = msg;
      document.getElementById('errorMsg').classList.add('visible');
      document.getElementById('successMsg').classList.remove('visible');
    }

    function showSuccess(msg) {
      document.getElementById('successText').textContent = msg;
      document.getElementById('successMsg').classList.add('visible');
      document.getElementById('errorMsg').classList.remove('visible');
    }

    function hideMessages() {
      document.getElementById('errorMsg').classList.remove('visible');
      document.getElementById('successMsg').classList.remove('visible');
    }

    async function sendCode() {
      hideMessages();
      const email = document.getElementById('emailInput').value.trim().toLowerCase();
      if (!email) return showError('Please enter your email');

      const btn = document.getElementById('sendCodeBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Sending...';

      try {
        const data = await (await fetch(`${window.API_URL || 'http://localhost:5000/api'}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        })).json();

        if (data.error) throw new Error(data.error);

        resetEmail = email;
        showSuccess(`Code sent! Check your email. (Dev code: ${data.resetCode})`);
        document.getElementById('step1').classList.remove('visible');
        document.getElementById('step2').classList.add('visible');
        document.getElementById('codeInput').value = data.resetCode; // Auto-fill in dev
      } catch (err) {
        showError(err.message || 'Failed to send code');
        btn.disabled = false;
        btn.innerHTML = '<i class="ti ti-send"></i> Send Reset Code';
      }
    }

    async function resetPassword() {
      hideMessages();
      const code = document.getElementById('codeInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const confirm = document.getElementById('confirmInput').value;

      if (!code) return showError('Please enter the reset code');
      if (!password || password.length < 6) return showError('Password must be at least 6 characters');
      if (password !== confirm) return showError('Passwords do not match');

      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Resetting...';

      try {
        const data = await (await fetch(`${window.API_URL || 'http://localhost:5000/api'}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: resetEmail, code, password })
        })).json();

        if (data.error) throw new Error(data.error);

        showSuccess('Password reset successful! Redirecting to sign in...');
        setTimeout(() => { window.location.href = 'guest-login.html'; }, 2000);
      } catch (err) {
        showError(err.message || 'Failed to reset password');
        btn.disabled = false;
        btn.innerHTML = '<i class="ti ti-check"></i> Reset Password';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (document.getElementById('step1').classList.contains('visible')) sendCode();
        else if (document.getElementById('step2').classList.contains('visible')) resetPassword();
      }
    });
  </script>
</body>
</html>
